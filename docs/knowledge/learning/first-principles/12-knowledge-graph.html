if (!selectedNodeId || selectedNodeId === sourceNodeId) {
hideRelationModal();
cancelNodeSelection();
return;
}
const exists = edgesData.some((e, idx) =>
!userDeletedEdgeIds.has(idx) &&
((e.from === sourceNodeId && e.to === selectedNodeId && e.relation === relation) ||
(e.to === sourceNodeId && e.from === selectedNodeId && e.relation === relation))
);
if (exists) {
showToast('该关系已存在');
hideRelationModal();
cancelNodeSelection();
return;
}
const userEdgeExists = userAddedEdges.some(e =>
(e.from === sourceNodeId && e.to === selectedNodeId && e.relation === relation) ||
(e.to === sourceNodeId && e.from === selectedNodeId && e.relation === relation)
);
if (userEdgeExists) {
showToast('该关系已在新增列表中');
hideRelationModal();
cancelNodeSelection();
return;
}
const style = edgeStyleInfo[relation] || edgeStyleInfo['related_to'] || {color: '#4caf50', dashes: true};
const newEdge = {
id: 'user-' + userAddedEdges.length,
from: sourceNodeId,
to: selectedNodeId,
relation: relation,
color: {color: '#4caf50', highlight: '#4caf50', hover: '#4caf50'},
width: 2,
dashes: [5, 5],
smooth: {enabled: true, type: 'continuous'},
label: relationLabels[relation] || relation,
font: {color: '#4caf50', size: 10, strokeWidth: 2, strokeColor: '#fff'},
isUserEdge: true,
};
edgesDS.add(newEdge);
userAddedEdges.push({
from: sourceNodeId,
to: selectedNodeId,
relation: relation,
fromLabel: nodeMap[sourceNodeId].label,
toLabel: nodeMap[selectedNodeId].label,
});
if (!neighborMap[sourceNodeId]) neighborMap[sourceNodeId] = new Set();
if (!neighborMap[selectedNodeId]) neighborMap[selectedNodeId] = new Set();
neighborMap[sourceNodeId].add(selectedNodeId);
neighborMap[selectedNodeId].add(sourceNodeId);
showToast('✅ 关系创建成功');
hideRelationModal();
cancelNodeSelection();
updateExportButton();
}
function deleteUserEdge(edgeId) {
const idx = parseInt(edgeId.replace('user-', ''));
if (idx >= 0 && idx < userAddedEdges.length) {
edgesDS.remove(edgeId);
const removed = userAddedEdges[idx];
if (neighborMap[removed.from] && neighborMap[removed.to]) {
neighborMap[removed.from].delete(removed.to);
neighborMap[removed.to].delete(removed.from);
}
userAddedEdges.splice(idx, 1);
edgesDS.get().forEach(e => {
if (e.isUserEdge) {
const oldIdx = parseInt(e.id.replace('user-', ''));
if (oldIdx > idx) {
edgesDS.update({id: e.id, id: 'user-' + (oldIdx - 1)});
}
}
});
showToast('🗑️ 已删除新增关系');
updateExportButton();
}
}
function deleteOriginalEdge(edgeIdx) {
if (confirm('确定要删除这条原始关系吗？删除后将在导出时标记为删除。')) {
userDeletedEdgeIds.add(edgeIdx);
applyFilters();
showToast('🗑️ 关系已标记为删除（导出时生效）');
updateExportButton();
}
}
function updateExportButton() {
const btnExport = document.getElementById('btn-export');
const count = userAddedEdges.length + userDeletedEdgeIds.size;
if (count > 0) {
btnExport.textContent = '💾 导出修改 (' + count + ')';
} else {
btnExport.textContent = '💾 导出修改';
}
}
function generatePythonExport() {
if (userAddedEdges.length === 0 && userDeletedEdgeIds.size === 0) {
return '# 暂无修改内容';
}
let code = '# 用户新增的关系（粘贴到 manual_edges 配置中）\n';
code += '# 生成时间: ' + new Date().toLocaleString() + '\n\n';
if (userAddedEdges.length > 0) {
code += 'manual_edges = [\n';
userAddedEdges.forEach(e => {
code += '    {\"source\": \"' + e.from + '\", \"target\": \"' + e.to + '\", \"relation\": \"' + e.relation + '\"},  # ' + e.fromLabel + ' -> ' + e.toLabel + '\n';
});
code += ']\n\n';
}
if (userDeletedEdgeIds.size > 0) {
code += '# 注意：以下是标记为删除的原始边ID，需要手动从对应配置中移除：\n';
code += '# deleted_edge_indices = ' + JSON.stringify(Array.from(userDeletedEdgeIds)) + '\n';
}
return code;
}
function generateJSONExport() {
return JSON.stringify({
added_edges: userAddedEdges,
deleted_edge_indices: Array.from(userDeletedEdgeIds),
export_time: new Date().toISOString(),
}, null, 2);
}
function showExportModal() {
const modal = document.getElementById('export-modal');
const countInfo = document.getElementById('edge-count-info');
const content = document.getElementById('export-content');
countInfo.textContent = '共新增 ' + userAddedEdges.length + ' 条关系，标记删除 ' + userDeletedEdgeIds.size + ' 条';
document.querySelectorAll('.export-tab').forEach(t => t.classList.remove('active'));
document.querySelector('.export-tab[data-format="python"]').classList.add('active');
content.textContent = generatePythonExport();
modal.classList.add('show');
}
function hideExportModal() {
document.getElementById('export-modal').classList.remove('show');
}
function copyExport() {
const content = document.getElementById('export-content').textContent;
navigator.clipboard.writeText(content).then(() => {
showToast('📋 已复制到剪贴板');
}).catch(() => {
const textarea = document.createElement('textarea');
textarea.value = content;
document.body.appendChild(textarea);
textarea.select();
document.execCommand('copy');
document.body.removeChild(textarea);
showToast('📋 已复制到剪贴板');
});
}
function handleNetworkClick(params) {
if (!editMode) {
if (params.nodes.length > 0) {
showDetail(params.nodes[0]);
} else {
hideDetail();
}
return;
}
if (params.nodes.length > 0) {
const nodeId = params.nodes[0];
if (!sourceNodeId) {
sourceNodeId = nodeId;
const node = nodeMap[nodeId];
const editStatus = document.getElementById('edit-status');
const btnCancel = document.getElementById('btn-cancel-select');
editStatus.innerHTML = '已选择源: <strong style="color:#4caf50;">' + node.label + '</strong><br>请点击「目标」节点';
btnCancel.style.display = 'inline-block';
network.selectNodes([nodeId]);
applyFilters();
} else if (nodeId !== sourceNodeId) {
network.selectNodes([sourceNodeId, nodeId]);
showRelationModal(sourceNodeId, nodeId);
}
}
}
function initNetwork() {
if (typeof vis === 'undefined') {
document.getElementById('network').style.display = 'none';
document.getElementById('fallback').style.display = 'block';
renderFallback();
return;
}
const container = document.getElementById('network');
nodesDS = new vis.DataSet(nodesData);
const edgesWithIds = edgesData.map((e, i) => { const copy = Object.assign({}, e); copy.id = i; return copy; });
edgesDS = new vis.DataSet(edgesWithIds);
const data = {nodes: nodesDS, edges: edgesDS};
const options = {
nodes: {
shape: 'dot',
scaling: {min: 10, max: 40},
font: {size: 14, color: '#333', face: 'sans-serif', strokeWidth: 3, strokeColor: '#fff'},
borderWidth: 2,
borderWidthSelected: 4,
},
edges: {
smooth: {enabled: true, type: 'continuous'},
font: {size: 10, align: 'middle'},
},
physics: {
enabled: true,
solver: 'forceAtlas2Based',
forceAtlas2Based: {
gravitationalConstant: -50,
centralGravity: 0.01,
springLength: 150,
springConstant: 0.08,
damping: 0.4,
},
stabilization: {iterations: 200},
},
interaction: {
hover: true,
tooltipDelay: 200,
zoomView: true,
dragView: true,
dragNodes: true,
},
manipulation: {
enabled: false,
},
};
network = new vis.Network(container, data, options);
network.on('click', handleNetworkClick);
network.on('oncontext', (params) => {
if (!editMode) return;
params.event.preventDefault();
const edgeId = network.getEdgeAt(params.pointer.DOM);
if (edgeId !== undefined) {
if (typeof edgeId === 'string' && edgeId.startsWith('user-')) {
if (confirm('确定要删除这条新增的关系吗？')) {
deleteUserEdge(edgeId);
}
} else if (typeof edgeId === 'number') {
deleteOriginalEdge(edgeId);
}
}
});
network.once('stabilizationIterationsDone', () => {
network.setOptions({physics: {enabled: false}});
});
if (!enableEditing) {
document.getElementById('btn-edit-mode').style.display = 'none';
}
}
function renderFallback() {
const container = document.getElementById('fallback-content');
const groups = {};
Object.keys(typeLabels).forEach(t => groups[t] = []);
nodesData.forEach(n => {
if (groups[n.type]) groups[n.type].push(n);
});
Object.entries(groups).forEach(([type, nodeList]) => {
if (nodeList.length === 0) return;
const label = typeLabels[type] || type;
const color = typeColors[type] || '#757575';
const div = document.createElement('div');
div.className = 'fallback-group';
div.innerHTML = '<h3>' + label + '（' + nodeList.length + '个）</h3>';
nodeList.forEach(n => {
const item = document.createElement('div');
item.className = 'fallback-node';
item.style.borderLeftColor = n.color ? n.color.background : color;
let connInfo = '';
const neighbors = (neighborMap[n.id] || new Set());
if (neighbors.size > 0) {
const neighborLabels = Array.from(neighbors).slice(0, 5).map(nid => nodeMap[nid] ? nodeMap[nid].label : nid).join('、');
connInfo = ' <span class="node-type">→ ' + neighborLabels + (neighbors.size > 5 ? '...' : '') + '</span>';
}
item.innerHTML = n.label + '<span class="node-type">[' + label + ']</span>' + connInfo;
div.appendChild(item);
});
container.appendChild(div);
});
}
document.getElementById('detail-close').addEventListener('click', hideDetail);
document.getElementById('btn-edit-mode').addEventListener('click', toggleEditMode);
document.getElementById('btn-cancel-select').addEventListener('click', cancelNodeSelection);
document.getElementById('btn-export').addEventListener('click', showExportModal);
document.getElementById('btn-cancel-relation').addEventListener('click', () => { hideRelationModal(); cancelNodeSelection(); });
document.getElementById('btn-confirm-relation').addEventListener('click', confirmRelation);
document.getElementById('btn-close-export').addEventListener('click', hideExportModal);
document.getElementById('btn-copy-export').addEventListener('click', copyExport);
document.querySelectorAll('.export-tab').forEach(tab => {
tab.addEventListener('click', () => {
document.querySelectorAll('.export-tab').forEach(t => t.classList.remove('active'));
tab.classList.add('active');
const format = tab.dataset.format;
const content = document.getElementById('export-content');
content.textContent = format === 'python' ? generatePythonExport() : generateJSONExport();
});
});
initFilters();
initLegend();
initSearch();
initNetwork();
</script>
</body>
</html>
