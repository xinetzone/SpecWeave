# ==================== 解析器配置（放在最后） ====================

# --- 术语表 2.1 核心概念类 ---
[[parsers]]
type = "table"
file = "11-glossary.md"
section = "### 2.1 核心概念类"
node_type = "concept"
id_prefix = "concept_"
id_from = "name"
min_columns = 4
columns = {name = 0, name_en = 1, definition = 2, remark = 3}

# --- 术语表 2.2 来源与可信度类 ---
[[parsers]]
