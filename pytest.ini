[pytest]
norecursedirs = vendor .temp .venv __pycache__ .git node_modules .trae external playground
testpaths = .agents/scripts/tests
python_files = test_*.py

[coverage:run]
branch = False
source = .agents/scripts
omit =
    .agents/scripts/tests/*
    .agents/scripts/hooks/*
    .agents/scripts/forum_bot/*
    .agents/scripts/mdi/*
    .agents/scripts/sg_dashboard/*
    .agents/scripts/lib/*
    .agents/scripts/trae_edge_case_handler/*
    .agents/scripts/sitecustomize.py
    .agents/scripts/_*.py
    .agents/scripts/demo_*.py
    .agents/scripts/test_*.py
    .agents/scripts/fix_*.py
    .agents/scripts/add-*.py
    .agents/scripts/cleanup-*.py
    .agents/scripts/analyze_*.py
    .agents/scripts/backup-*.py
    .agents/scripts/batch-*.py
    .agents/scripts/convert_*.py
    .agents/scripts/scan_*.py
    .agents/scripts/generate-*.py
    .agents/scripts/build-*.py
    .agents/scripts/credibility-*.py
    .agents/scripts/defuddle-*.py
    .agents/scripts/export-*.py
    .agents/scripts/extract-*.py
    .agents/scripts/finalize-*.py
    .agents/scripts/git-*.py
    .agents/scripts/new-*.py
    .agents/scripts/path-*.py
    .agents/scripts/profile.*
    .agents/scripts/Install-*
    .agents/scripts/setup-*.ps1
    .agents/scripts/ci-check.*
    .agents/scripts/check-encoding.ps1
    .agents/scripts/test-wechat-*.ps1
    .agents/scripts/verify-*.ps1
    .agents/scripts/*.ps1

[coverage:report]
show_missing = False
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    raise NotImplementedError
