<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#121638;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#090c1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8cf8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c0f28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8ecf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8c4e0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="centerPulse" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with gradient - deeper xuan black -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.2"/>

  <!-- Center glow at the convergence point (玄牝之门) -->
  <circle cx="256" cy="256" r="80" fill="url(#centerGlow)" opacity="0.5"/>

  <!-- Taiji (Yin-Yang) main structure -->
  <!-- Light half (right/top) - Yang: Technology/Code/Network/Collective -->
  <path d="M256,48 A208,208 0 0,1 256,464 A104,104 0 0,1 256,256 A104,104 0 0,0 256,48" fill="url(#silverGrad)" opacity="0.92"/>

  <!-- Dark half (left/bottom) - Yin: Philosophy/Dao/Wisdom -->
  <path d="M256,48 A208,208 0 0,0 256,464 A104,104 0 0,0 256,256 A104,104 0 0,1 256,48" fill="url(#darkGrad)" opacity="0.95"/>

  <!-- S-curve dividing line - subtle gold highlight, enhanced -->
  <path d="M256,48 A104,104 0 0,1 256,256 A104,104 0 0,0 256,464" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.25"/>

  <!-- Yin dot (dark dot in light area - top) -->
  <circle cx="256" cy="152" r="33" fill="url(#darkGrad)"/>
  <circle cx="256" cy="152" r="16" fill="url(#goldGrad)" filter="url(#softGlow)"/>

  <!-- Yang dot (light dot in dark area - bottom) -->
  <circle cx="256" cy="360" r="33" fill="url(#silverGrad)"/>
  <circle cx="256" cy="360" r="16" fill="#5b8a9e" filter="url(#softGlow)"/>

  <!-- Center convergence point - 玄牝之门 -->
  <circle cx="256" cy="256" r="8" fill="#c23a2e" filter="url(#centerPulse)" opacity="0.9"/>
  <circle cx="256" cy="256" r="3.5" fill="#f5f0e6"/>

  <!-- AI Network nodes - interconnected collective in Yang half (right) -->
  <g opacity="0.55">
    <!-- Network nodes forming a collective/diamond pattern -->
    <circle cx="350" cy="180" r="4.5" fill="#5b8a9e" filter="url(#glow)"/>
    <circle cx="395" cy="256" r="5.5" fill="#5b8a9e" filter="url(#glow)"/>
    <circle cx="350" cy="332" r="4.5" fill="#5b8a9e" filter="url(#glow)"/>
    <circle cx="305" cy="256" r="3.5" fill="#7aa8ba" filter="url(#glow)"/>
    <circle cx="370" cy="160" r="3" fill="#7aa8ba"/>
    <circle cx="410" cy="220" r="3" fill="#7aa8ba"/>
    <circle cx="410" cy="292" r="3" fill="#7aa8ba"/>
    <circle cx="370" cy="352" r="3" fill="#7aa8ba"/>
    <circle cx="330" cy="150" r="2.5" fill="#9dc2cf"/>
    <circle cx="420" cy="260" r="2.5" fill="#9dc2cf"/>
    <circle cx="330" cy="362" r="2.5" fill="#9dc2cf"/>
    <circle cx="285" cy="200" r="2" fill="#b8d4dd"/>
    <circle cx="285" cy="312" r="2" fill="#b8d4dd"/>

    <!-- Connecting lines - more web-like for collective feeling -->
    <line x1="350" y1="180" x2="395" y2="256" stroke="#5b8a9e" stroke-width="1.2" opacity="0.7"/>
    <line x1="395" y1="256" x2="350" y2="332" stroke="#5b8a9e" stroke-width="1.2" opacity="0.7"/>
    <line x1="350" y1="180" x2="305" y2="256" stroke="#5b8a9e" stroke-width="1" opacity="0.5"/>
    <line x1="305" y1="256" x2="350" y2="332" stroke="#5b8a9e" stroke-width="1" opacity="0.5"/>
    <line x1="395" y1="256" x2="305" y2="256" stroke="#5b8a9e" stroke-width="1" opacity="0.4"/>
    <line x1="370" y1="160" x2="350" y2="180" stroke="#7aa8ba" stroke-width="0.8" opacity="0.5"/>
    <line x1="410" y1="220" x2="395" y2="256" stroke="#7aa8ba" stroke-width="0.8" opacity="0.5"/>
    <line x1="410" y1="220" x2="370" y2="160" stroke="#7aa8ba" stroke-width="0.6" opacity="0.4"/>
    <line x1="410" y1="292" x2="395" y2="256" stroke="#7aa8ba" stroke-width="0.8" opacity="0.5"/>
    <line x1="370" y1="352" x2="350" y2="332" stroke="#7aa8ba" stroke-width="0.8" opacity="0.5"/>
    <line x1="410" y1="292" x2="370" y2="352" stroke="#7aa8ba" stroke-width="0.6" opacity="0.4"/>
    <line x1="330" y1="150" x2="350" y2="180" stroke="#9dc2cf" stroke-width="0.5" opacity="0.3"/>
    <line x1="420" y1="260" x2="395" y2="256" stroke="#9dc2cf" stroke-width="0.5" opacity="0.3"/>
    <line x1="330" y1="362" x2="350" y2="332" stroke="#9dc2cf" stroke-width="0.5" opacity="0.3"/>
    <!-- Lines connecting toward center (convergence) -->
    <line x1="305" y1="256" x2="256" y2="256" stroke="#5b8a9e" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="285" y1="200" x2="256" y2="256" stroke="#7aa8ba" stroke-width="0.5" opacity="0.25" stroke-dasharray="2,3"/>
    <line x1="285" y1="312" x2="256" y2="256" stroke="#7aa8ba" stroke-width="0.5" opacity="0.25" stroke-dasharray="2,3"/>
  </g>

  <!-- Dao calligraphy essence - refined 道 character in Yin half (left) -->
  <g transform="translate(136,256)" opacity="0.85">
    <g filter="url(#softGlow)">
      <!-- Top arc - 首 radical, more refined -->
      <path d="M2,-72 Q0,-96 32,-96 Q62,-94 62,-70 Q60,-48 30,-44 Q0,-40 2,-72Z" fill="none" stroke="url(#goldGrad)" stroke-width="2.2"/>
      <!-- Central vertical stroke -->
      <line x1="32" y1="-44" x2="32" y2="32" stroke="url(#goldGrad)" stroke-width="2.2"/>
      <!-- Horizontal strokes - balanced -->
      <line x1="8" y1="-24" x2="56" y2="-24" stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.75"/>
      <line x1="12" y1="-4" x2="52" y2="-4" stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.75"/>
      <!-- Walking radical (辶) - more fluid curve -->
      <path d="M-8,22 Q2,38 22,32 Q38,26 42,42 Q46,58 20,62 Q-6,64 -8,42" fill="none" stroke="url(#goldGrad)" stroke-width="2.2"/>
      <!-- Top dot accent -->
      <circle cx="6" cy="-76" r="2.5" fill="url(#goldGrad)"/>
    </g>
  </g>

  <!-- Code brackets - subtle tech mark -->
  <g transform="translate(372,142)" opacity="0.3">
    <text x="0" y="0" fill="#5b8a9e" font-family="'Courier New', monospace" font-size="22" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- "玄同" mark at top - replacing the "D" -->
  <text x="256" y="108" text-anchor="middle" fill="url(#goldGrad)" font-family="'Noto Serif SC', 'Songti SC', 'SimSun', serif" font-size="36" font-weight="600" filter="url(#softGlow)" opacity="0.85" letter-spacing="4">玄同</text>

  <!-- Subtle orbital rings - more refined -->
  <ellipse cx="256" cy="256" rx="222" ry="58" fill="none" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.12" transform="rotate(-18 256 256)"/>
  <ellipse cx="256" cy="256" rx="58" ry="222" fill="none" stroke="#5b8a9e" stroke-width="0.4" opacity="0.12" transform="rotate(-18 256 256)"/>

  <!-- Small dots along outer ring - 8 trigrams suggestion -->
  <g opacity="0.2">
    <circle cx="256" cy="56" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="398" cy="136" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="448" cy="256" r="1.5" fill="#5b8a9e"/>
    <circle cx="398" cy="376" r="1.5" fill="#5b8a9e"/>
    <circle cx="256" cy="456" r="1.5" fill="#5b8a9e"/>
    <circle cx="114" cy="376" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="64" cy="256" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="114" cy="136" r="1.5" fill="url(#goldGrad)"/>
  </g>
</svg>