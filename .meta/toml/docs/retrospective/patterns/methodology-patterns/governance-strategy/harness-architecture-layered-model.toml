summary = "Harness是模型接入真实世界之前的运行骨架，包含Workflow/Tools/Permissions/Memory/Evaluation五层架构，最小核心骨架为chooseTool→runTool→updateContext→saveArtifacts→shouldStop。核心反常识结论：模型只是引擎，Harness才是整辆车。操作步骤包括Workflow设计（打破单轮问答循环）、文件系统记忆（冷热分层）、权限与恢复设计（三级权限）。反模式包括参数崇拜、上下文窗口越大越好、单轮问答逻辑。迁移验证覆盖智能体测试平台、文档自动化工具、数据分析平台、传统软件开发流程。"
