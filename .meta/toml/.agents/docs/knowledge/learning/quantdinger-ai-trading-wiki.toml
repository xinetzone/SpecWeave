summary = "QuantDinger是一个开源的自托管AI量化交易平台，采用Apache 2.0协议，通过Docker Compose一键部署，将AI研究、策略编写、回测、模拟盘、实盘执行、监控全链路整合。本教程系统介绍其系统架构、双轨策略开发、MCP Agent Gateway、安全模型等核心特性，并萃取可复用的垂直领域AI基础设施设计模式。"
