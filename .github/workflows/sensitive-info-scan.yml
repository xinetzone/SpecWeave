name: Sensitive Information Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sensitive-info-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run sensitive information scan
        working-directory: .agents/scripts
        run: python check-sensitive-info.py --only-severity high
