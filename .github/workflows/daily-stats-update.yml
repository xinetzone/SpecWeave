name: Daily Stats Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Update Project Stats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      PYTHONPATH: ${{ github.workspace }}/.agents/scripts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run docgen stats
        working-directory: .agents/scripts
        run: python docgen.py stats

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes needed"
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md AGENTS.md
          git commit -m "chore(docs): 自动更新核心数据统计 [skip ci]"
          git push
