name: Concurrent Safety Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  concurrent-safety-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests for concurrent safety checker
        run: python -m pytest .agents/scripts/tests/test_check_concurrent_safety.py -v

      - name: Run concurrent safety scan (.agents/scripts)
        run: python .agents/scripts/check-concurrent-safety.py --path .agents/scripts --fail-on-error

      - name: Run concurrent safety scan (vendor modules)
        run: python .agents/scripts/check-concurrent-safety.py --path vendor --fail-on-warn
        continue-on-error: true
