<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竹简悟道</title>
<style>
:root {
  --bg-primary: #F3E5C4;
  --bg-secondary: #E8D5B0;
  --bg-panel: #F9F3E5;
  --bg-input: #FEFAF2;
  --text-primary: #2C1810;
  --text-secondary: #6B5B4F;
  --text-muted: #9B8B7F;
  --accent: #8B4513;
  --accent-red: #B22222;
  --accent-jade: #5B8C5A;
  --border: #C4A97D;
  --border-light: #D4C5A9;
  --shadow: rgba(44, 24, 16, 0.08);
  --shadow-strong: rgba(44, 24, 16, 0.15);
  --font-title: "Noto Serif SC", "SimSun", "STSong", "Songti SC", serif;
  --font-body: "Noto Serif SC", "SimSun", "STSong", "Songti SC", serif;
  --font-ui: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  --radius: 6px;
  --radius-lg: 12px;
  --transition: 0.3s ease;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(139, 69, 19, 0.03) 2px,
      rgba(139, 69, 19, 0.03) 3px
    ),
    linear-gradient(180deg, #F3E5C4 0%, #EAD9B8 30%, #F3E5C4 60%, #E8D5B0 100%);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.8;
  letter-spacing: 0.02em;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(139, 69, 19, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(91, 140, 90, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 720px;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

.header {
  text-align: center;
  padding: 40px 0 24px;
  position: relative;
}

.header-seal {
  display: inline-block;
  width: 60px;
  height: 60px;
  border: 2px solid var(--accent-red);
  color: var(--accent-red);
  font-family: var(--font-title);
  font-size: 18px;
  line-height: 56px;
  text-align: center;
  transform: rotate(-8deg);
  margin-bottom: 16px;
  opacity: 0.85;
  user-select: none;
}

.header h1 {
  font-family: var(--font-title);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.header .subtitle {
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  letter-spacing: 0.08em;
}

.tab-nav {
  display: flex;
  gap: 4px;
  margin: 24px 0;
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  padding: 5px;
  border: 1px solid var(--border-light);
}

.tab-btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-title);
  font-size: 0.95rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all var(--transition);
  position: relative;
  letter-spacing: 0.06em;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(139, 69, 19, 0.06);
}

.tab-btn.active {
  background: var(--bg-panel);
  color: var(--text-primary);
  box-shadow: 0 2px 8px var(--shadow);
  font-weight: 600;
}

.tab-panel {
  display: none;
  animation: fadeSlide 0.4s ease;
}

.tab-panel.active {
  display: block;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px var(--shadow);
  position: relative;
}

.panel-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 24px;
  right: 24px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.daily-section {
  text-align: center;
}

.daily-date {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  letter-spacing: 0.06em;
}

.daily-quote {
  font-family: var(--font-title);
  font-size: 1.35rem;
  color: var(--text-primary);
  line-height: 2;
  padding: 24px 16px;
  border-left: 3px solid var(--accent);
  border-right: 3px solid var(--accent);
  margin: 0 auto 20px;
  max-width: 480px;
  position: relative;
  letter-spacing: 0.08em;
}

.daily-quote::before,
.daily-quote::after {
  content: '';
  position: absolute;
  left: 8px;
  right: 8px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.daily-quote::before { top: 6px; }
.daily-quote::after { bottom: 6px; }

.daily-source {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
  font-family: var(--font-ui);
}

.thought-input-area {
  margin-top: 16px;
}

.thought-input-area textarea {
  width: 100%;
  min-height: 80px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  background: var(--bg-input);
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text-primary);
  resize: vertical;
  transition: border-color var(--transition);
  line-height: 1.8;
}

.thought-input-area textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.08);
}

.thought-input-area textarea::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  font-family: var(--font-title);
  font-size: 0.95rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.06em;
  margin-top: 12px;
}

.btn:hover {
  background: #A0522D;
  border-color: #A0522D;
  box-shadow: 0 2px 8px var(--shadow-strong);
}

.btn-outline {
  background: transparent;
  color: var(--accent);
}

.btn-outline:hover {
  background: rgba(139, 69, 19, 0.06);
  color: var(--accent);
}

.chat-area {
  max-height: 420px;
  overflow-y: auto;
  padding-right: 4px;
  margin-bottom: 16px;
}

.chat-area::-webkit-scrollbar {
  width: 4px;
}

.chat-area::-webkit-scrollbar-track {
  background: transparent;
}

.chat-area::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 2px;
}

.chat-msg {
  margin-bottom: 18px;
  animation: fadeSlide 0.35s ease;
}

.chat-msg.user {
  text-align: right;
}

.chat-msg.user .msg-bubble {
  display: inline-block;
  background: var(--bg-secondary);
  color: var(--text-primary);
  padding: 10px 16px;
  border-radius: var(--radius-lg) var(--radius) var(--radius-lg) var(--radius-lg);
  max-width: 78%;
  font-size: 0.92rem;
  line-height: 1.7;
  text-align: left;
  border: 1px solid var(--border-light);
}

.chat-msg.ai .msg-bubble {
  display: inline-block;
  background: var(--bg-panel);
  color: var(--text-primary);
  padding: 12px 18px;
  border-radius: var(--radius) var(--radius-lg) var(--radius-lg) var(--radius-lg);
  max-width: 85%;
  font-size: 0.92rem;
  line-height: 1.8;
  border: 1px solid var(--border-light);
  border-left: 3px solid var(--accent-jade);
  position: relative;
}

.chat-msg.ai .msg-label {
  font-size: 0.72rem;
  color: var(--accent-jade);
  font-family: var(--font-ui);
  margin-bottom: 4px;
  letter-spacing: 0.08em;
}

.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 12px 18px;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}

.scenario-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}

.scenario-tag {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg-panel);
  font-family: var(--font-title);
  font-size: 0.85rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  letter-spacing: 0.05em;
}

.scenario-tag:hover {
  background: rgba(139, 69, 19, 0.06);
  border-color: var(--accent);
  color: var(--text-primary);
}

.scenario-tag.active-tag {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.scenario-tag.active-tag .scenario-tag-sub {
  color: rgba(255, 255, 255, 0.65);
}

.scenario-tag-sub {
  display: block;
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  margin-top: 1px;
  transition: color var(--transition);
}

.scenario-section-label {
  width: 100%;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  padding: 10px 4px 2px 4px;
  margin-top: 8px;
}

.scenario-section-divider {
  width: 100%;
  height: 0;
  margin: 2px 0 6px 0;
  border-top: 1px dashed var(--border-light);
}

.scenario-tag-flow {
  width: 100%;
  padding: 12px 18px;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(139, 69, 19, 0.05), rgba(91, 140, 90, 0.05));
  text-align: center;
}

.scenario-tag-flow:hover {
  background: linear-gradient(135deg, rgba(139, 69, 19, 0.1), rgba(91, 140, 90, 0.1));
  border-color: var(--accent);
}

.scenario-tag-flow.active-tag {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.bamboo-browser {
  position: relative;
}

.bamboo-chapter {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.bamboo-chapter:hover {
  background: rgba(139, 69, 19, 0.04);
}

.bamboo-chapter-num {
  font-family: var(--font-title);
  font-size: 1.8rem;
  color: var(--accent-red);
  line-height: 1;
  min-width: 48px;
  text-align: center;
  opacity: 0.7;
}

.bamboo-chapter-info {
  flex: 1;
}

.bamboo-chapter-title {
  font-family: var(--font-title);
  font-size: 1rem;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: 0.06em;
}

.bamboo-chapter-preview {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.bamboo-detail {
  display: none;
  padding: 24px;
  animation: fadeSlide 0.35s ease;
}

.bamboo-detail.open {
  display: block;
}

.bamboo-detail .verse {
  font-family: var(--font-title);
  font-size: 1.15rem;
  line-height: 2.2;
  color: var(--text-primary);
  padding: 20px;
  background: var(--bg-input);
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  margin-bottom: 16px;
  letter-spacing: 0.06em;
  text-align: center;
}

.bamboo-detail .note {
  font-size: 0.8rem;
  color: var(--accent-red);
  text-align: center;
  margin-bottom: 16px;
  font-family: var(--font-ui);
}

.bamboo-detail .interpretation {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.8;
  padding: 16px;
  border-left: 2px solid var(--border);
  margin-bottom: 16px;
}

.bamboo-detail .diff-note {
  font-size: 0.82rem;
  color: var(--accent);
  font-family: var(--font-ui);
  background: rgba(139, 69, 19, 0.05);
  padding: 10px 14px;
  border-radius: var(--radius);
  margin-top: 12px;
}

.btn-back {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-title);
  font-size: 0.9rem;
  cursor: pointer;
  padding: 6px 0;
  margin-bottom: 16px;
  transition: color var(--transition);
}

.btn-back:hover {
  color: var(--accent);
}

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state p {
  font-family: var(--font-title);
  font-size: 0.95rem;
  letter-spacing: 0.06em;
}

.footer {
  text-align: center;
  padding: 32px 0;
  color: var(--text-muted);
  font-size: 0.78rem;
  font-family: var(--font-ui);
  letter-spacing: 0.06em;
}

.seal-decoration {
  display: inline-block;
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--accent-red);
  color: var(--accent-red);
  font-family: var(--font-title);
  font-size: 12px;
  line-height: 33px;
  text-align: center;
  transform: rotate(-6deg);
  opacity: 0.5;
  margin-top: 16px;
  user-select: none;
}

@media (max-width: 480px) {
  .header h1 { font-size: 1.6rem; }
  .daily-quote { font-size: 1.1rem; padding: 16px 12px; }
  .tab-btn { font-size: 0.82rem; padding: 10px 12px; }
  .chat-msg.ai .msg-bubble { max-width: 92%; }
  .chat-msg.user .msg-bubble { max-width: 85%; }
  .bamboo-chapter-num { font-size: 1.4rem; min-width: 36px; }
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-seal">道</div>
    <h1>竹简悟道</h1>
    <p class="subtitle">—— 一个陪你慢慢想透的智慧伙伴 ——</p>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="daily">每日一问</button>
    <button class="tab-btn" data-tab="scenario">场景对话</button>
    <button class="tab-btn" data-tab="bamboo">帛书浏览</button>
  </nav>

  <div id="tab-daily" class="tab-panel active">
    <div class="panel-card">
      <div class="daily-section">
        <div class="daily-date" id="dailyDate"></div>
        <div class="daily-quote" id="dailyQuote"></div>
        <div class="daily-source" id="dailySource"></div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">今日之问，不急于答。静下来，慢慢想。</p>
        <div class="thought-input-area">
          <textarea id="dailyInput" placeholder="写下你此刻的所思所感……"></textarea>
          <button class="btn" onclick="submitDailyThought()">静心回应</button>
        </div>
        <div id="dailyResponse" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <div id="tab-scenario" class="tab-panel">
    <div class="panel-card">
      <div class="scenario-tags" id="scenarioTags">
        <button class="scenario-tag scenario-tag-flow" data-scenario="flow">且问且行</button>
        <div class="scenario-section-divider"></div>
        <button class="scenario-tag" data-scenario="deciding">决策前<small class="scenario-tag-sub">重大决策</small></button>
        <button class="scenario-tag" data-scenario="lost">迷茫时<small class="scenario-tag-sub">方向探索</small></button>
        <button class="scenario-tag" data-scenario="conflict">冲突中<small class="scenario-tag-sub">人际关系</small></button>
        <button class="scenario-tag" data-scenario="changing">变革期<small class="scenario-tag-sub">职业困惑</small></button>
        <button class="scenario-tag" data-scenario="cultivate">日常修养<small class="scenario-tag-sub">创作瓶颈</small></button>
        <button class="scenario-tag" data-scenario="team">团队管理<small class="scenario-tag-sub">管理困境</small></button>
        <button class="scenario-tag" data-scenario="growing">个人成长<small class="scenario-tag-sub">编程困境</small></button>
        <div class="scenario-section-divider"></div>
        <button class="scenario-tag scenario-tag-flow" data-scenario="action">行无行<small class="scenario-tag-sub">知行合一</small></button>
      </div>
      <div class="chat-area" id="chatArea">
        <div class="empty-state">
          <div class="icon">🎋</div>
          <p>点「且问且行」让竹简悟道先来问你<br>或从下方选一个你此刻的感受——<br>这里没有标准答案，只有陪你慢慢想透的对话</p>
        </div>
      </div>
      <div class="thought-input-area" style="display:flex;gap:8px;">
        <textarea id="scenarioInput" placeholder="写下你的困惑……" style="flex:1;min-height:52px;" rows="2"></textarea>
        <button class="btn" onclick="submitScenario()" style="margin-top:0;flex-shrink:0;">发送</button>
      </div>
    </div>
  </div>

  <div id="tab-bamboo" class="tab-panel">
    <div class="panel-card">
      <div class="bamboo-browser" id="bambooList"></div>
      <div class="bamboo-detail" id="bambooDetail"></div>
      <p style="text-align:center;color:var(--text-muted);font-size:0.78rem;margin-top:12px;font-family:var(--font-ui);letter-spacing:0.06em;">帛书《老子》共八十一章，此处精选八章，余章待君展开 ——</p>
    </div>
  </div>

  <footer class="footer">
    <p>帛书老子 · 马王堆汉墓出土 · 公元前二世纪</p>
    <div class="seal-decoration">悟</div>
  </footer>
</div>

<script>
var dailyQuestions = [
  {
    quote: '道可道也，非恒道也。\n名可名也，非恒名也。',
    source: '—— 帛书《老子》第一章',
    hint: '今天，有什么你一直以为是"理所当然"的事，其实只是你给它取的一个"名"？'
  },
  {
    quote: '反也者，道之动也。\n弱也者，道之用也。',
    source: '—— 帛书《老子》第四十章',
    hint: '你最近在哪件事上感到"走进了死胡同"？有没有一种可能——走到"反面"，恰是走出来的方式？'
  },
  {
    quote: '知足者，富也。\n强行者，有志也。',
    source: '—— 帛书《老子》第三十三章',
    hint: '今天有什么让你感到"还不够"的念头？如果此刻就是"够了"，你的感受会有什么不同？'
  },
  {
    quote: '曲则全，枉则正，\n洼则盈，敝则新。',
    source: '—— 帛书《老子》第二十二章',
    hint: '最近有什么"不完美"的事，让你耿耿于怀？如果那不完美本身，就是整件事"全"的一部分呢？'
  },
  {
    quote: '知者弗言，言者弗知。',
    source: '—— 帛书《老子》第五十六章',
    hint: '今天有没有哪一刻，你说了很多，却感觉没有真正被理解？如果你少说一句，会发生什么？'
  },
  {
    quote: '大直如屈，大巧如拙，大赢如绌。',
    source: '—— 帛书《老子》第四十五章',
    hint: '有没有什么事，你一直在追求"做得更好"，但也许"不做得那么好"反而是更好的方式？'
  },
  {
    quote: '为无为，事无事，味无味。',
    source: '—— 帛书《老子》第六十三章',
    hint: '今天你做了多少"必须做"的事？如果有一件事你可以不做，那会是什么？'
  },
  {
    quote: '上士闻道，勤而行之。',
    source: '—— 帛书《老子》第四十一章',
    hint: '今天有没有一件事，你已经"知道"了很久，但还没去做？不需要做对，不需要做好——只需要做。'
  }

  { num: '十四', title: '执今之道', verse: '执今之道，以御今之有，以知古始，是谓道纪。', note: '通行版作"执古之道"，语义相反。', interpretation: '把握当今的道，来驾驭当今的事物，以此推知远古的开端——这就是道的纲纪。', diff: '关键差异：帛书作"执今之道"（把握当今之道），通行版作"执古之道"（把握古代之道），语义完全相反。帛书更强调"与时俱进"，而非"复古守旧"。' },
  { num: '三十三', title: '自知者明', verse: '知人者，知也。自知者，明也。胜人者，有力也。自胜者，强也。知足者，富也。强行者，有志也。不失其所者，久也。死而不忘者，寿也。', note: '通行版"知也"作"智也"，"忘"作"亡"。', interpretation: '了解别人，是智慧。了解自己，是明达。战胜别人，是有力量。战胜自己，是真正的强大。知道满足，是富有。坚持前行，是有志向。不失去根本，才能长久。身死而精神不灭，才是真正的长寿。', diff: '帛书"知也"（知道、了解）更朴实，通行版"智也"加了"智"的价值判断。帛书"死而不忘"（死后不被遗忘）比通行版"死而不亡"（死后精神不灭）更接近事实描述。' },
  { num: '二十八', title: '恒德不离', verse: '知其雄，守其雌，为天下溪。为天下溪，恒德不离，复归于婴儿。知其白，守其黑，为天下式。为天下式，恒德不忒，复归于无极。知其荣，守其辱，为天下谷。为天下谷，恒德乃足，复归于朴。朴散则为器，圣人用之则为官长。夫大制无割。', note: '通行版作"常德不离"，且部分章节顺序不同。', interpretation: '知道雄强，却守住雌柔，做天下的溪流。做天下的溪流，恒常的德就不会离去，回归到婴儿般的纯真状态。知道光亮，却守住暗昧，做天下的范式。做天下的范式，恒常的德就不会偏差，回归到无极的本源。知道荣耀，却守住卑辱，做天下的山谷。做天下的山谷，恒常的德就会充足，回归到朴素的本质。"朴"是原木——未经雕琢的本然状态。原木散开后成为具体的器物，圣人用它们成为百官之长。所以真正伟大的制度，是不割裂本然的整体。', diff: '关键差异：帛书作"恒德"（永恒之德），通行版为避汉文帝刘恒讳改为"常德"——只是一字之避讳，但"恒德"更凸显帛书版"道之恒常"的哲学一致性（恒道→恒德→恒名，三者皆以"恒"贯通）。本章展示"知其雄，守其雌"的守中致和之道——不是否定对立面，而是在对立中守住那个不偏不倚的中心，这正是恒德得以"不离""不忒""乃足"的实践路径。' },
  { num: '四十一', title: '道褒无名', verse: '上士闻道，勤能行之；中士闻道，若存若亡；下士闻道，大笑之。弗笑，不足以为道。是以建言有之曰：明道如费，进道如退，夷道如类。上德如谷，大白如辱，广德如不足，建德如偷，质真如渝。大方无隅，大器免成，大音希声，大象无形。道褒无名。夫唯道，善始且善成。', note: '通行版作"道隐无名"，且"大器免成"被改为"大器晚成"。', interpretation: '上士听了道，勤奋地践行；中士听了道，半信半疑；下士听了道，大声嘲笑它。不被嘲笑，就不足以称为道。所以古语有言：光明的道好像暗昧，前进的道好像后退，平坦的道好像崎岖。最高的德如同低谷，最白的东西如同有污垢，广大的德好像不足，刚健的德好像怠惰，质朴的德好像善变。最大的方形没有棱角，最大的器物不被塑造，最大的声音听不到，最大的形象看不见。道广大无边，却不用一个名字来标榜自己。只有道，善于开始并善于完成。', diff: '关键差异一：帛书作"道褒无名"（道广大显扬却无名），通行版作"道隐无名"（道隐藏无名）——一字之差，道从"无处不在的显化"变为"隐蔽的神秘之物"。差异二：帛书"大器免成"（不被塑造）vs 通行版"大器晚成"——前者是"道法自然"的哲学精粹，后者被赋予"厚积薄发"的励志含义。' },
  { num: '四十二', title: '中气以为和', verse: '道生一，一生二，二生三，三生万物。万物负阴而抱阳，中气以为和。人之所恶，唯孤、寡、不谷，而王公以为称。故物或损之而益，或益之而损。人之所教，我亦教之。强梁者不得其死。吾将以为教父。', note: '通行版作"冲气以为和"，被解读为阴阳二气激荡之说。', interpretation: '道生出了一，一化生了二，二产生了三，三衍生万物。万物都背负着阴而怀抱着阳，"中气"使它们达到和谐。人们厌恶的，是孤、寡、不谷，而王公却用来自称。所以事物有时减损反而增益，有时增益反而减损。别人教导我的，我也用来教人。强横的人不得善终。我将以此作为教戒的根本。', diff: '核心差异：帛书作"中气以为和"——"中气"指守中致虚，强调通过内心的虚空达到阴阳平衡，与"致虚极，守静笃"的内省路径一脉相承；通行版"冲气以为和"被解读为阴阳二气的外部激荡，将老子思想与阴阳学说绑定，偏离了其内观路径。' }
];
</script>

<script>
(function() {
  var today = new Date();
  var dayIndex = today.getDate() % dailyQuestions.length;
  var dailyQ = dailyQuestions[dayIndex];

  document.getElementById('dailyDate').textContent =
    today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
  document.getElementById('dailyQuote').textContent = dailyQ.quote;
  document.getElementById('dailySource').textContent = dailyQ.source + ' — ' + dailyQ.hint;

  window.submitDailyThought = function() {
    var input = document.getElementById('dailyInput');
    var response = document.getElementById('dailyResponse');
    var text = input.value.trim();
    if (!text) return;

    response.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    setTimeout(function() {
      var replies = aiResponses.fallback;
      var reply = replies[dayIndex % replies.length];
      response.innerHTML =
        '<div class="chat-msg ai">' +
        '<div class="msg-label">竹简悟道</div>' +
        '<div class="msg-bubble">' + reply + '</div>' +
        '</div>' +
        '<p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">' +
        '明天，再来问一个问题——不是找答案，而是练习"问"本身。' +
        '</p>';
      input.value = '';
    }, 1800);
  };

  window.submitScenario = function() {
    var input = document.getElementById('scenarioInput');
    var chatArea = document.getElementById('chatArea');
    var text = input.value.trim();
    if (!text) return;

    var emptyState = chatArea.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    var userMsg = document.createElement('div');
    userMsg.className = 'chat-msg user';
    userMsg.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
    chatArea.appendChild(userMsg);

    var typingDiv = document.createElement('div');
    typingDiv.className = 'chat-msg ai';
    typingDiv.innerHTML =
      '<div class="msg-label">竹简悟道</div>' +
      '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatArea.appendChild(typingDiv);

    var activeTag = document.querySelector('.scenario-tag.active-tag');
    var scenario;
    if (activeTag && activeTag.dataset.scenario === 'flow') {
      activeTag.classList.remove('active-tag');
      scenario = null;
    } else {
      scenario = activeTag ? activeTag.dataset.scenario : null;
    }

    setTimeout(function() {
      typingDiv.remove();

      var responsePool;
      if (scenario && aiResponses[scenario]) {
        responsePool = aiResponses[scenario];
      } else {
        var keys = Object.keys(aiResponses).filter(function(k) { return k !== 'fallback'; });
        responsePool = aiResponses[keys[Math.floor(Math.random() * keys.length)]];
      }

      var reply = responsePool[Math.floor(Math.random() * responsePool.length)];

      var aiMsg = document.createElement('div');
      aiMsg.className = 'chat-msg ai';
      aiMsg.innerHTML =
        '<div class="msg-label">竹简悟道</div>' +
        '<div class="msg-bubble">' + reply + '</div>';
      chatArea.appendChild(aiMsg);

      chatArea.scrollTop = chatArea.scrollHeight;
      input.value = '';
    }, 1800);

    chatArea.scrollTop = chatArea.scrollHeight;
  };

  function openFlowConversation() {
    var chatArea = document.getElementById('chatArea');
    var emptyState = chatArea.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    var openingQuestion = aiResponses.flow[Math.floor(Math.random() * aiResponses.flow.length)];

    var aiMsg = document.createElement('div');
    aiMsg.className = 'chat-msg ai';
    aiMsg.innerHTML =
      '<div class="msg-label">竹简悟道</div>' +
      '<div class="msg-bubble">' + openingQuestion + '</div>';
    chatArea.appendChild(aiMsg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function renderBambooList() {
    var listEl = document.getElementById('bambooList');
    var html = '';
    bambooChapters.forEach(function(ch) {
      html +=
        '<div class="bamboo-chapter" onclick="openBambooDetail(\'' + ch.num + '\')">' +
        '<div class="bamboo-chapter-num">' + ch.num + '</div>' +
        '<div class="bamboo-chapter-info">' +
        '<div class="bamboo-chapter-title">' + ch.title + '</div>' +
        '<div class="bamboo-chapter-preview">' + ch.verse.substring(0, 32) + '……</div>' +
        '</div>' +
        '</div>';
    });
    listEl.innerHTML = html;
  }

  window.openBambooDetail = function(num) {
    var ch = bambooChapters.find(function(c) { return c.num === num; });
    if (!ch) return;

    var listEl = document.getElementById('bambooList');
    var detailEl = document.getElementById('bambooDetail');

    listEl.style.display = 'none';
    detailEl.className = 'bamboo-detail open';
    detailEl.innerHTML =
      '<button class="btn-back" onclick="closeBambooDetail()">← 返回目录</button>' +
      '<h2 style="font-family:var(--font-title);font-size:1.3rem;margin-bottom:8px;letter-spacing:0.08em;">第' + ch.num + '章 · ' + ch.title + '</h2>' +
      '<div class="verse">' + ch.verse + '</div>' +
      '<div class="note">' + ch.note + '</div>' +
      '<div class="interpretation">' + ch.interpretation + '</div>' +
      '<div class="diff-note">📜 ' + ch.diff + '</div>';
  };

  window.closeBambooDetail = function() {
    var listEl = document.getElementById('bambooList');
    var detailEl = document.getElementById('bambooDetail');
    listEl.style.display = 'block';
    detailEl.className = 'bamboo-detail';
  };

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = this.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });

  document.querySelectorAll('.scenario-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('.scenario-tag').forEach(function(t) { t.classList.remove('active-tag'); });
      this.classList.add('active-tag');
      if (this.dataset.scenario === 'flow') {
        openFlowConversation();
      }
    });
  });

  document.getElementById('scenarioInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      window.submitScenario();
    }
  });

  document.getElementById('dailyInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) {
      e.preventDefault();
      window.submitDailyThought();
    }
  });

  renderBambooList();
})();
</script>

</body>
</html>
