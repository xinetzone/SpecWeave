# ==================== 解析器配置（放在最后避免TOML数组表语法问题） ====================

[[parsers]]
type = "table"
file = "06-concepts-glossary.md"
section = "## 2. 核心概念术语表"
node_type = "concept"
id_prefix = "concept_"
id_from = "name"
link_column = "related"
link_relation = "related_to"
min_columns = 7
columns = {name = 0, name_en = 1, definition = 2, source = 3, domain = 4, related = 5, remark = 6}
domain_mapping = {"哲学" = "哲学", "物理学" = "物理学", "方法论" = "方法论", "认知科学" = "认知科学", "通用" = "通用"}

[[parsers]]
type = "table"
file = "07-timeline.md"
section = "## 9. 时间线节点快速索引"
node_type = "event"
id_prefix = "event_"
id_from = "event_name"
min_columns = 5
columns = {seq = 0, time = 1, event_name = 2, period = 3, importance = 4}

[[parsers]]
type = "table"
file = "07-timeline.md"
section = "## 6. 关键人物传承关系简表"
node_type = "person"
id_prefix = "person_"
id_from = "person_names"
split_names_by = "[/、，,]"
min_columns = 4
columns = {period = 0, person_names = 1, contribution = 2, first_principle_view = 3}

[[parsers]]
type = "table"
file = "README.md"
section = "## 6. 文件导航"
node_type = "document"
id_prefix = "doc_"
id_from = "file_cell"
filename_from_link = true
label_from = "title"
min_columns = 6
columns = {index = 0, file_cell = 1, title = 2, introduction = 3, difficulty = 4, reading_order = 5}