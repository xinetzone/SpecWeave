# 第一性原理知识图谱配置
# 使用通用知识图谱生成器，通过TOML配置从Markdown文档集生成交互式知识图谱

input_dir = "."
output = "12-knowledge-graph.html"

[graph]
title = "🕸️ 第一性原理知识图谱"
subtitle = "从古希腊哲学到当代商业方法论的思想传承网络 · __NODE_COUNT__个节点 · __EDGE_COUNT__条关系"

[graph.node_types.concept]
label = "概念"
color = "#757575"
size = 18
shape = "dot"
rating_bonus = true
domain_colors = {"哲学" = "#8B4513", "物理学" = "#1E88E5", "方法论" = "#43A047", "认知科学" = "#FB8C00", "通用" = "#757575"}

[graph.node_types.person]
label = "人物"
color = "#E53935"
size = 22
shape = "dot"

[graph.node_types.event]
label = "事件"
color = "#8E24AA"
size = 22
shape = "dot"

[graph.node_types.document]
label = "文档"
color = "#00897B"
size = 18
shape = "dot"

[graph.node_types.period]
label = "时期"
color = "#546E7A"
size = 35
shape = "diamond"

[graph.edge_types.related_to]
label = "概念相关"
color = "#999"
width = 1
dashes = false
arrows = ""

[graph.edge_types.influenced]
label = "思想传承"
color = "#1565C0"
width = 2
dashes = false
arrows = "to"

[graph.edge_types.preceded]
label = "时序先后"
color = "#BBB"
width = 1
dashes = false
arrows = "to"

[graph.edge_types.belongs_to]
label = "时期归属"
color = "#CCC"
width = 1
dashes = [6, 4]
arrows = ""

[graph.edge_types.defined_in]
label = "概念定义"
color = "#4CAF50"
width = 1
dashes = [2, 3]
arrows = ""

[graph.edge_types.contributed]
label = "人物贡献"
color = "#FF9800"
width = 2
dashes = false
arrows = "to"

# ==================== 手工节点（历史时期） ====================

[[manual_nodes]]
id = "period_ancient"
label = "古希腊哲学时期"
type = "period"
time_range = "公元前6世纪-公元前3世纪"
description = "从泰勒斯等前苏格拉底哲学家对本原的探索，到亚里士多德系统阐述archē概念，欧几里得《几何原本》公理化实践"

[[manual_nodes]]
id = "period_modern"
label = "近代哲学与科学革命"
type = "period"
time_range = "17世纪-18世纪"
description = "笛卡尔\"我思故我在\"认识论转向、斯宾诺莎几何学方法、牛顿经典力学公理体系、康德先天综合判断"

[[manual_nodes]]
id = "period_modern_science"
label = "现代科学时期"
type = "period"
time_range = "19世纪-20世纪"
description = "非欧几何发展、量子力学建立、密度泛函理论（DFT）奠基与发展、费曼物理学方法论、Anderson\"More is Different\"对还原论的反思"

[[manual_nodes]]
id = "period_contemporary"
label = "当代商业与方法论时期"
type = "period"
time_range = "20世纪末-21世纪"
description = "马斯克在创业实践中应用第一性原理、2013年TED演讲使其在硅谷广泛传播、AI时代的新发展"

