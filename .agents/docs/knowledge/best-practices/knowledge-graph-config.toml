type = "dimension"
description = "死锁维度：循环等待死锁等"
severity = "error"

[[manual_nodes]]
id = "dim_leak"
label = "LEAK"
type = "dimension"
description = "泄漏维度：资源泄漏等"
severity = "error"

[[manual_nodes]]
id = "dim_boundary"
label = "BOUNDARY"
type = "dimension"
description = "边界维度：N≥3边界缺失等"
severity = "warn"

[[manual_nodes]]
id = "dim_defensive"
label = "DEFENSIVE"
type = "dimension"
description = "防御维度：外部可变引用等"
severity = "warn"

[[manual_nodes]]
id = "dim_config"
label = "CONFIG"
type = "dimension"
description = "配置维度：硬编码阈值等"
severity = "warn"

[[manual_nodes]]
id = "dim_i18n"
label = "I18N"
type = "dimension"
description = "国际化维度：中英文分词问题等"
severity = "info"

