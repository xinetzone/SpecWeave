# ==================== 解析器配置（放在最后） ====================

# --- 最佳实践文档索引表 ---
[[parsers]]
type = "table"
file = "README.md"
section = "## 📚 最佳实践文档索引"
node_type = "practice"
id_prefix = "doc_"
id_from = "file_cell"
filename_from_link = true
min_columns = 3
columns = {file_cell = 0, introduction = 1, tags = 2}
split_names_by = ""
extra_fields = {category = "best-practice"}
