# 团队最佳实践库知识图谱配置
# 使用通用知识图谱生成器，从Markdown文档索引表生成交互式知识图谱

input_dir = "."
output = "knowledge-graph.html"

[graph]
title = "📚 团队最佳实践库知识图谱"
subtitle = "代码审查、工具链、方法论等最佳实践导航网络 · __NODE_COUNT__个节点 · __EDGE_COUNT__条关系"

# ==================== 节点类型定义 ====================

[graph.node_types.concept]
label = "核心概念"
color = "#8E24AA"
size = 20
shape = "dot"

[graph.node_types.practice]
label = "最佳实践"
color = "#1E88E5"
size = 18
shape = "dot"

[graph.node_types.scenario]
label = "应用场景"
color = "#43A047"
size = 18
shape = "dot"

[graph.node_types.severity]
label = "严重度级别"
color = "#E53935"
size = 22
shape = "diamond"

[graph.node_types.dimension]
label = "检查维度"
color = "#FB8C00"
size = 18
shape = "dot"

# ==================== 边类型定义 ====================

[graph.edge_types.related_to]
label = "相关"
color = "#999"
width = 1
dashes = false
arrows = ""

[graph.edge_types.covers]
label = "覆盖"
color = "#4CAF50"
width = 2
dashes = false
arrows = "to"

[graph.edge_types.tagged]
label = "标签"
color = "#2196F3"
width = 1
dashes = [2, 3]
arrows = ""

[graph.edge_types.belongs_to]
label = "属于"
color = "#BBB"
width = 1
dashes = [6, 4]
arrows = "to"

[graph.edge_types.leads_to]
label = "推荐阅读"
color = "#9C27B0"
width = 1
dashes = false
arrows = "to"

# ==================== 手工节点 ====================

[[manual_nodes]]
id = "root_best_practices"
label = "团队最佳实践库"
type = "concept"
introduction = "团队沉淀的代码审查、工具链配置、方法论等可复用最佳实践集合，源自实战复盘并经过验证"

[[manual_nodes]]
id = "severity_error"
label = "🔴 error"
type = "severity"
description = "必须修复，否则存在生产事故风险"

[[manual_nodes]]
id = "severity_warn"
label = "🟡 warn"
type = "severity"
description = "建议修复，影响健壮性与可维护性"

[[manual_nodes]]
id = "severity_info"
label = "🟢 info"
type = "info"
description = "可选优化，涉及特定场景时关注"

# 八维检查法维度节点
[[manual_nodes]]
id = "dim_timeout"
label = "TIMEOUT"
type = "dimension"
description = "超时维度：无超时锁等"
severity = "error"

[[manual_nodes]]
id = "dim_idempotent"
label = "IDEMPOTENT"
type = "dimension"
description = "幂等维度：非幂等操作等"
severity = "error"

[[manual_nodes]]
id = "dim_deadlock"
