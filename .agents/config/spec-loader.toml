# ============================================================================
# L2 渐进式披露加载器配置 (SpecLoader Configuration)
# ============================================================================
# 生产环境配置文件，控制 spec_loader.py 的缓存策略和层加载行为。
# 修改此文件后无需重启，SpecLoader 每次初始化时读取最新配置。
#
# 配置加载优先级：
#   1. 构造函数显式参数（use_disk_cache 等）
#   2. 本配置文件（spec-loader.toml）
#   3. 代码内置默认值（fallback）
# ============================================================================

[meta]
version = "1.0"
description = "L2渐进式披露规范加载器生产配置"
last_updated = "2026-07-12"

# ----------------------------------------------------------------------------
# 缓存配置 (Disk Cache)
# ----------------------------------------------------------------------------
# 基于 mtime 的持久化磁盘缓存，跨会话复用已读取的规范文件内容。
# 实测性能提升：冷启动 ~0.87ms → 温启动 ~0.25ms（加速比 3.5x，提升 71.3%）
# ----------------------------------------------------------------------------

[cache]
# 是否启用磁盘缓存（设为 false 则每次都从磁盘读取，适合调试/排查问题）
enabled = true

# 缓存目录名（相对于 .agents/ 目录）
dir_name = ".cache"

# 缓存文件名
filename = "spec-loader.json"

# 最大缓存条目数（超过则按 LRU 策略淘汰最旧条目）
# 建议值：项目规范文件总数 + 50（约200足够覆盖39个规范文件+历史访问）
max_entries = 200

# 缓存版本号（升级此值会使所有现有缓存失效，用于缓存格式变更后强制重建）
# 当前版本：2（L1a/L1b拆分后更新）
version = 2

# 是否使用原子写入（先写 .tmp 再 os.replace，防止写入中断导致缓存损坏）
# 生产环境建议 true
atomic_write = true

# mtime 比对精度（秒），文件 mtime 差值小于此值视为未修改
# 0.001秒（1毫秒）对于大多数文件系统足够精确
mtime_precision = 0.001

# ----------------------------------------------------------------------------
# 层加载策略 (Layer Loading Strategy)
# ----------------------------------------------------------------------------
# 控制四层架构（L0→L1a→L1b→L2）中各层的默认加载行为。
# ----------------------------------------------------------------------------

[layers]
# 在哪些阶段默认加载 L1b 索引文档
# - "planning": 任务规划阶段（需要路由表来分析任务）
# - "startup": 会话启动阶段（初始化全部索引）
# execution/verification 阶段默认跳过 L1b，减少常驻上下文
l1b_default_stages = ["planning", "startup"]

# L0 入口文件（相对 .agents/ 路径）
l0_specs = [
    "ONBOARDING.md",
]

# L1a 核心规则文件（始终加载，execution阶段基线）
l1a_core_specs = [
    "global-core-rules.md",
    "capability-boundaries.md",
]

# L1b 索引文档文件（按需加载）
l1b_index_specs = [
    "capability-registry.md",
    "context-routing.md",
    "skills/README.md",
]

# ----------------------------------------------------------------------------
# 日志配置 (Logging)
# ----------------------------------------------------------------------------

[logging]
# 是否启用步骤级耗时分解日志（HIT/MISS 详细耗时）
# true: 输出 resolve/memcheck/lookup/mtime-stat/construct/read-io 各步骤耗时
# false: 仅输出汇总日志
enable_timing_breakdown = true

# 缓存命中/未命中日志级别："debug" | "info"
# "info" 适合生产环境监控缓存效果
cache_log_level = "info"

# ----------------------------------------------------------------------------
# 性能调优 (Performance Tuning)
# ----------------------------------------------------------------------------
# 以下参数通常不需要修改，调整前建议先运行 benchmark 对比。

[performance]
# L2 最大加载字符数（不设置或设为0 = 不限制）
# 设置上限可防止异常任务类型匹配加载过多规范导致上下文爆炸
# max_l2_chars = 50000

# 是否在 load_for_task 结束后自动保存缓存
# true: 自动保存（推荐）；false: 需手动调用 save_cache()
auto_save_cache = true

# 初始化时是否预加载磁盘缓存
# true: 启动时一次性读取缓存文件（推荐，~0.15ms开销）
# false: 首次访问时懒加载
preload_disk_cache = true
