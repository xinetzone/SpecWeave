# ============================================================================
# 误报过滤通用规则 (False Positive Rules)
# ============================================================================
# 供所有 linter/checker/scanner 共享使用的误报过滤规则集。
# 任何检查工具都可以加载此文件，按层级应用过滤：
#   1. path_exclusions:  路径/目录/文件名排除（扫描前跳过）
#   2. file_markers:     文件头标记排除（读前N行匹配标记则跳过文件）
#   3. block_filters:    代码块级别过滤（块内行满足条件则过滤）
#   4. line_filters:     单行级别过滤（归一化后匹配则忽略该行）
#
# 注意：正则表达式一律使用 TOML literal string（单引号包裹），避免反斜杠转义。
# ============================================================================

[meta]
version = "1.0"
description = "通用误报过滤规则，供所有检查脚本共享使用"

# ----------------------------------------------------------------------------
# 1. 路径排除规则 — 扫描前直接跳过
# ----------------------------------------------------------------------------
[path_exclusions]

# 目录名排除（路径中包含这些目录名的全部跳过）
dir_names = [
    "__pycache__",
    ".git",
    ".temp",
    ".venv",
    "node_modules",
    "vendor",
    "generated",
    "dist",
    "build",
    ".mypy_cache",
    ".pytest_cache",
]

# 文件名排除（完整文件名匹配）
file_names = [
    "__init__.py",
    "conftest.py",
]

# 文件路径正则排除（正则匹配相对路径则跳过）
# 使用 literal string（单引号）避免反斜杠转义
path_patterns = [
    '(^|[/\\\\])vendor[/\\\\]',
    '(^|[/\\\\])node_modules[/\\\\]',
    '(^|[/\\\\])generated[/\\\\]',
    '(^|[/\\\\])fixtures[/\\\\]',
    '(^|[/\\\\])__pycache__[/\\\\]',
    '_pb2\.py$',
    '_pb2_grpc\.py$',
    '\.min\.(js|css)$',
]

# ----------------------------------------------------------------------------
# 2. 文件头标记规则 — 读前N行，匹配标记则跳过整个文件
# ----------------------------------------------------------------------------
# 每个规则: { patterns = [...], scan_lines = N, match_all = false, min_matches = 1 }
# match_all = true: 所有pattern都要出现才排除
# match_all = false（默认）: 出现至少 min_matches 个pattern即排除

[file_markers]

[file_markers.compat_wrapper]
patterns = [
    "向后兼容",
    "向后兼容包装",
    "薄包装层",
    "此脚本已合并至",
    "backward compatibility",
    "compat wrapper",
]
scan_lines = 10
match_all = false
min_matches = 1
description = "向后兼容薄包装器/转发层"

[file_markers.auto_generated]
patterns = [
    "@generated",
    "AUTO-GENERATED",
    "自动生成",
    "DO NOT EDIT",
    "自动生成的文件",
    "Generated by",
]
scan_lines = 15
match_all = false
min_matches = 1
description = "自动生成的代码文件"

[file_markers.third_party]
patterns = [
    "Copyright (c)",
    "Licensed under",
    "MIT License",
    "Apache License",
    "BSD License",
]
scan_lines = 20
match_all = false
min_matches = 2
description = "第三方/vendored文件（需多个许可标记同时出现）"

# ----------------------------------------------------------------------------
# 3. 代码块级别过滤规则
# ----------------------------------------------------------------------------
# match_all = true:  块中每一行都必须匹配 patterns 中任一正则（纯样板块检测）
# match_all = false: 块中至少 min_matches 行匹配即可（特征行检测）

[block_filters]

[block_filters.import_boilerplate]
patterns = [
    '^import\s+',
    '^from\s+\S+\s+import\s+',
    '^#!/',
    '^#\s*-\*-\s*coding\s*:',
    '^"""$',
    "^'''$",
    '^#\s*type:\s*ignore',
    '^#\s*noqa',
    '^#\s*ruff:',
    '^#\s*isort:',
    '^#\s*fmt:',
    '^\.\.\.$',
    '^pass$',
]
match_all = true
min_lines = 1
min_matches = 1
description = "纯import/文件头样板块（shebang、编码声明、docstring标记、import语句、linter指令）"

[block_filters.class_boilerplate]
patterns = [
    '^class\s+\w+.*:$',
    '^def\s+__init__\s*\(self',
    '^super\(\)\.__init__',
    '^self\.\w+\s*=\s*None$',
    '^self\.\w+\s*=\s*\[\]$',
    '^self\.\w+\s*=\s*{}$',
]
match_all = true
min_lines = 3
min_matches = 1
description = "类定义样板（简单__init__赋值）"

[block_filters.dataclass_boilerplate]
patterns = [
    '^@dataclass',
    '^class\s+\w+.*:$',
    '^\w+:\s*\w+.*$',
    '^\w+:\s*bool\s*=\s*(True|False)$',
    '^\w+:\s*int\s*=\s*0$',
    '^\w+:\s*str\s*=\s*""$',
    '^\w+:\s*float\s*=\s*0\.0$',
    '^\w+:\s*list\[',
    '^\w+:\s*dict\[',
    '^\w+:\s*Optional\[',
    '^from\s+dataclasses\s+import',
]
match_all = false
min_lines = 1
min_matches = 4
description = "dataclass定义样板（字段声明）"

# ----------------------------------------------------------------------------
# 4. 单行级别过滤规则 — 归一化后匹配则忽略该行
# ----------------------------------------------------------------------------
[line_filters]

patterns = [
    '^"""$',
    "^'''$",
    '^#!/usr/bin/env',
    '^#!/.*$',
    '^#\s*-\*-\s*coding\s*:',
    '^#\s*type:\s*ignore',
    '^#\s*noqa',
    '^#\s*ruff:',
    '^#\s*isort:',
    '^#\s*fmt:\s*(on|off|skip)',
    '^pass$',
    '^\.\.\.$',
    '^\.\.\s+',
    '^return$',
    '^return\s+None$',
    '^break$',
    '^continue$',
    '^yield$',
    '^raise$',
    '^else:$',
    '^elif\s+.*:$',
    '^except\s*:?$',
    '^except\s+\w+\s*:?$',
    '^finally:$',
    '^try:$',
    '^if\s+__name__\s*==\s*["\x27]__main__["\x27]\s*:?$',
]
description = "单行结构标记/占位符/控制流关键词，不视为有效逻辑代码"
